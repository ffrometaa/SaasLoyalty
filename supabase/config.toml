# Supabase local development config
# https://supabase.com/docs/guides/cli/config

[api]
enabled = true
port = 54321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[db.pooler]
enabled = false
port = 54329
pool_mode = "transaction"
default_pool_size = 20
max_client_conn = 100

[realtime]
enabled = true
ip_version = "IPv4"
port = 54327
max_header_length = 4096

[studio]
enabled = true
port = 54323
api_url = "http://127.0.0.1"

[inbucket]
enabled = true
port = 54324
smtp_port = 54325
pop3_port = 54326

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = true
# Port used by the GoTrue server
port = 54321
site_url = "http://127.0.0.1:3000"
additional_redirect_urls = ["https://127.0.0.1:3000"]
jwt_expiry = 3600
refresh_token_expiry = 604800
enable_signup = true
enable_anonymous_sign_ins = false

[auth.email]
enable_signup = true
double_confirm_changes = false
enable_confirmations = true
secure_email_change_enabled = true
# Magic link template
template_subject = "Your Magic Link"
template_body = '<p>Hi {{ .User.Email }},</p><p>Click the link to sign in:</p><p><a href="{{ .ConfirmationURL }}">Sign In to LoyaltyOS</a></p>'

[edge_runtime]
enabled = true

[analytics]
enabled = true
port = 54328
backend = "postgres"

[pg_cron]
enabled = true

[vault]
enabled = true
